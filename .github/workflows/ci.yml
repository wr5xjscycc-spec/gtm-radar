name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    name: TS lanes (platform / measurement / sourcing)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install
      - name: Test (vitest, all TS workspaces)
        run: npm test

  python:
    name: Python lane (analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -r analysis/requirements.txt
      - name: Test (pytest)
        run: pytest analysis
